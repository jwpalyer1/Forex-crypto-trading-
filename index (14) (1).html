<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSignal AI | Live Global Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --buy: #22c55e; --sell: #ef4444; --bg: #020617; }
        body { background-color: var(--bg); color: #cbd5e1; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .tf-dot { width: 6px; height: 6px; border-radius: 1px; display: inline-block; margin-right: 2px; }
        .buy-dot { background-color: var(--buy); box-shadow: 0 0 5px rgba(34, 197, 94, 0.4); }
        .sell-dot { background-color: var(--sell); box-shadow: 0 0 5px rgba(239, 68, 68, 0.4); }
        .price-up { color: var(--buy) !important; transition: color 0.3s; }
        .price-down { color: var(--sell) !important; transition: color 0.3s; }
        .buy-row { border-left: 4px solid var(--buy); }
        .sell-row { border-left: 4px solid var(--sell); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="border-b border-white/5 p-4 glass sticky top-0 z-[100] flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></div>
            <h1 class="text-xl font-black tracking-tighter text-white uppercase">TradeSignal <span class="text-blue-500">AI</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <input type="text" id="master-search" placeholder="Search 200+ Assets..." class="bg-slate-900 border border-white/10 rounded-lg px-4 py-1.5 text-xs outline-none focus:border-blue-500 w-64">
            <div id="live-timer" class="text-xs font-mono text-blue-400">14:12:41 UTC</div>
        </div>
    </nav>

    <div class="max-w-[1600px] mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <aside class="lg:col-span-3 space-y-6">
            <div class="glass p-5 rounded-2xl">
                <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-4 italic">Risk Management</h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-slate-500">Balance ($)</label>
                        <input type="number" id="calc-bal" value="10000" class="w-full bg-slate-900 border border-white/10 p-2 rounded-lg mt-1 outline-none text-white font-mono">
                    </div>
                    <div class="p-4 bg-blue-500/10 rounded-xl border border-blue-500/20 text-center">
                        <p class="text-[10px] text-blue-400 uppercase font-bold">Recommended Lot Size</p>
                        <h2 id="lot-output" class="text-3xl font-black text-white">0.10</h2>
                    </div>
                </div>
            </div>

            <div class="glass p-5 rounded-2xl">
                <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-4 italic">AI Market Pulse</h3>
                <div class="space-y-4 text-[11px]" id="news-container">
                    <div class="border-b border-white/5 pb-3">
                        <span class="text-orange-500 font-bold">⚡ VOLATILITY ALERT</span>
                        <p class="mt-1 text-slate-300">High-frequency buy orders detected on BTC/USDT at $68,700 level.</p>
                        <span class="text-[9px] text-slate-500">Node-JP • Just Now</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="lg:col-span-9 space-y-4">
            <div class="flex bg-slate-900/50 p-1 rounded-xl border border-white/5 w-fit">
                <button onclick="switchMarket('forex')" id="tab-forex" class="px-6 py-2 rounded-lg text-xs font-bold transition-all bg-blue-600 text-white">FOREX</button>
                <button onclick="switchMarket('crypto')" id="tab-crypto" class="px-6 py-2 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-white ml-1">CRYPTO</button>
            </div>

            <div class="glass rounded-2xl overflow-hidden shadow-2xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-white/5 text-[10px] uppercase font-bold text-slate-500">
                            <tr>
                                <th class="p-4">Asset / Pair</th>
                                <th class="p-4">Trend Matrix (M1-MN)</th>
                                <th class="p-4">Live Price</th>
                                <th class="p-4">AI Signal</th>
                                <th class="p-4">TP / SL</th>
                                <th class="p-4 text-center">Copy</th>
                            </tr>
                        </thead>
                        <tbody id="signal-rows" class="divide-y divide-white/5 font-mono text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const pairs = {
            forex: ["EUR/USD", "GBP/USD", "USD/JPY", "XAU/USD", "USD/CAD", "AUD/USD", "NAS100", "US30"],
            crypto: ["BTC/USDT", "ETH/USDT", "SOL/USDT", "XRP/USDT", "BNB/USDT", "DOGE/USDT", "ADA/USDT"]
        };

        let currentMarket = 'forex';
        let ws;

        function renderRows() {
            const container = document.getElementById('signal-rows');
            const search = document.getElementById('master-search').value.toUpperCase();
            const list = pairs[currentMarket];

            container.innerHTML = list.filter(s => s.includes(search)).map(s => {
                const isBuy = Math.random() > 0.5;
                const dots = Array(9).fill(0).map(() => `<span class="tf-dot ${Math.random() > 0.4 ? 'buy-dot' : 'sell-dot'}"></span>`).join('');
                
                return `
                    <tr class="signal-row hover:bg-white/[0.02] transition-colors ${isBuy ? 'buy-row' : 'sell-row'}" id="row-${s.replace('/', '')}">
                        <td class="p-4">
                            <div class="font-bold text-white">${s}</div>
                            <div class="text-[9px] text-slate-600">INT'L NODE #401</div>
                        </td>
                        <td class="p-4">${dots}</td>
                        <td class="p-4 text-blue-400 font-bold price-cell">---</td>
                        <td class="p-4">
                            <span class="px-2 py-0.5 rounded text-[10px] font-black ${isBuy ? 'bg-green-500/10 text-green-500' : 'bg-red-500/10 text-red-500'}">
                                ${isBuy ? 'BUY' : 'SELL'}
                            </span>
                        </td>
                        <td class="p-4 text-[10px]">
                            <div class="text-green-500">TP: <span class="tp-val">---</span></div>
                            <div class="text-red-500">SL: <span class="sl-val">---</span></div>
                        </td>
                        <td class="p-4 text-center">
                            <button onclick="copyTrade('${s}')" class="w-8 h-8 rounded-lg bg-white/5 hover:bg-blue-600 transition-all text-xs text-white">
                                <i class="fas fa-copy"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function initBinance() {
            ws = new WebSocket("wss://stream.binance.com:9443/ws/!ticker@arr");
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                data.forEach(t => {
                    const sym = t.s; // e.g. BTCUSDT
                    const row = document.getElementById(`row-${sym}`);
                    if (row) {
                        const price = parseFloat(t.c);
                        const cell = row.querySelector('.price-cell');
                        const oldPrice = parseFloat(cell.innerText) || 0;
                        
                        cell.innerText = price.toFixed(sym.includes('USDT') ? 2 : 5);
                        cell.className = `p-4 font-bold price-cell ${price > oldPrice ? 'price-up' : 'price-down'}`;
                        
                        // Update TP/SL logic
                        const isBuy = row.innerHTML.includes('BUY');
                        row.querySelector('.tp-val').innerText = (isBuy ? price * 1.012 : price * 0.988).toFixed(2);
                        row.querySelector('.sl-val').innerText = (isBuy ? price * 0.994 : price * 1.006).toFixed(2);
                    }
                });
            };
        }

        function switchMarket(m) {
            currentMarket = m;
            document.getElementById('tab-forex').className = m === 'forex' ? 'px-6 py-2 rounded-lg text-xs font-bold bg-blue-600 text-white' : 'px-6 py-2 rounded-lg text-xs font-bold text-slate-500 hover:text-white ml-1';
            document.getElementById('tab-crypto').className = m === 'crypto' ? 'px-6 py-2 rounded-lg text-xs font-bold bg-blue-600 text-white' : 'px-6 py-2 rounded-lg text-xs font-bold text-slate-500 hover:text-white ml-1';
            renderRows();
        }

        function copyTrade(sym) {
            const row = document.getElementById(`row-${sym.replace('/', '')}`);
            const price = row.querySelector('.price-cell').innerText;
            const signal = row.querySelector('.font-black').innerText;
            navigator.clipboard.writeText(`${sym} ${signal} at ${price}`);
            alert("Trade Setup Copied!");
        }

        document.getElementById('calc-bal').addEventListener('input', (e) => {
            document.getElementById('lot-output').innerText = (e.target.value / 100000).toFixed(2);
        });

        document.getElementById('master-search').addEventListener('input', renderRows);

        setInterval(() => {
            document.getElementById('live-timer').innerText = new Date().toISOString().split('T')[1].split('.')[0] + ' UTC';
        }, 1000);

        window.onload = () => { renderRows(); initBinance(); };
    </script>
</body>
</html>
